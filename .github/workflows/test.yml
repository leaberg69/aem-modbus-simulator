name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymodbus pyserial
      
      - name: Syntax check (main script)
        run: |
          python -m py_compile aem_60dc8_slave.py
      
      - name: Syntax check (examples)
        run: |
          for f in examples/*.py; do
            python -m py_compile "$f" && echo "OK: $f"
          done
      
      - name: Validate register map structure (no server start)
        run: |
          python -c "
          import ast
          tree = ast.parse(open(\"aem_60dc8_slave.py\").read())
          # Verificar que BAUDRATES tem 6 valores incluindo 38400
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for t in node.targets:
                      if isinstance(t, ast.Name) and t.id == \"BAUDRATES\":
                          vals = [el.value for el in node.value.elts]
                          assert 38400 in vals, f\"38400 missing: {vals}\"
                          assert len(vals) == 6, f\"Expected 6 baudrates, got {len(vals)}\"
                          print(f\"✓ BAUDRATES OK: {vals}\")
          "
